<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIRIUS — Notes de Lignes</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Roboto',sans-serif;background:#111827;color:#d0dde8;min-height:100vh;}

header{background:#0d1520;border-bottom:1px solid #243550;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
.header-title{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;letter-spacing:3px;color:#fff;}
.header-title span{color:#4da3ff;}
.header-sub{font-size:11px;color:#3a5a80;letter-spacing:2px;text-transform:uppercase;margin-top:2px;font-family:'Rajdhani',sans-serif;}

.container{max-width:900px;margin:0 auto;padding:24px 16px;}

.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.btn{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:1px;border:none;transition:all .2s;}
.btn-primary{background:linear-gradient(145deg,#4da3ff,#2d7dd6);color:#fff;box-shadow:0 3px 12px rgba(77,163,255,.3);}
.btn-primary:hover{background:linear-gradient(145deg,#62b0ff,#3a8ae0);}
.btn-secondary{background:#1a2535;color:#6080a0;border:1px solid #243550;}
.btn-secondary:hover{background:#1e2f44;color:#90aac0;}
.btn-danger{background:#2a0d0d;color:#fca5a5;border:1px solid #4a1a1a;}
.btn-danger:hover{background:#3a1010;}

.search-bar{flex:1;min-width:200px;padding:8px 14px;background:#1a2535;border:1px solid #243550;border-radius:20px;color:#d0dde8;font-size:13px;font-family:'Roboto',sans-serif;outline:none;transition:border-color .2s;}
.search-bar:focus{border-color:#4da3ff;}
.search-bar::placeholder{color:#3a5a80;}

.notes-list{display:flex;flex-direction:column;gap:12px;}

.note-card{background:#1a2535;border:1px solid #243550;border-radius:8px;overflow:hidden;transition:border-color .2s;}
.note-card:hover{border-color:#3a5a80;}
.note-card.expanded{border-color:#4da3ff;}

.note-header{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;}
.note-line-tag{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:1px;font-family:'Rajdhani',sans-serif;flex-shrink:0;}
.note-title-wrap{flex:1;}
.note-line-name{font-size:15px;font-weight:600;color:#d0dde8;}
.note-line-meta{font-size:11px;color:#3a5a80;margin-top:2px;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;}
.note-count{font-size:11px;color:#4da3ff;margin-right:6px;}
.note-chevron{color:#3a5a80;font-size:14px;transition:transform .2s;}
.note-card.expanded .note-chevron{transform:rotate(90deg);}

.note-body{display:none;border-top:1px solid #1a2d44;padding:16px;}
.note-card.expanded .note-body{display:block;}

.entries-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.entry-item{background:#111827;border:1px solid #1a2d44;border-radius:6px;padding:10px 14px;display:flex;align-items:flex-start;gap:10px;}
.entry-pk{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:#4da3ff;min-width:52px;padding-top:1px;flex-shrink:0;}
.entry-text{flex:1;font-size:13px;color:#b0c0d0;line-height:1.5;}
.entry-del{background:none;border:none;color:#3a5a80;cursor:pointer;font-size:14px;padding:0 4px;transition:color .2s;flex-shrink:0;}
.entry-del:hover{color:#fca5a5;}

.add-entry-form{display:flex;gap:8px;flex-wrap:wrap;}
.input-pk{width:90px;padding:7px 10px;background:#111827;border:1px solid #243550;border-radius:6px;color:#4da3ff;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;outline:none;transition:border-color .2s;}
.input-pk:focus{border-color:#4da3ff;}
.input-pk::placeholder{color:#2a4060;}
.input-note{flex:1;min-width:160px;padding:7px 10px;background:#111827;border:1px solid #243550;border-radius:6px;color:#d0dde8;font-family:'Roboto',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.input-note:focus{border-color:#4da3ff;}
.input-note::placeholder{color:#2a4060;}
.btn-add-entry{padding:7px 14px;background:#1e4d80;color:#7dd3fc;border:none;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;white-space:nowrap;}
.btn-add-entry:hover{background:#2a6aaa;}

.empty-state{text-align:center;padding:20px;color:#2a4060;font-size:13px;font-family:'Rajdhani',sans-serif;letter-spacing:1px;}

/* Add line modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#1a2535;border:1px solid #243550;border-radius:10px;padding:24px;width:100%;max-width:420px;margin:16px;}
.modal h2{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:#fff;letter-spacing:2px;margin-bottom:18px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:11px;color:#3a5a80;letter-spacing:1px;text-transform:uppercase;font-family:'Rajdhani',sans-serif;margin-bottom:5px;}
.form-input{width:100%;padding:9px 12px;background:#111827;border:1px solid #243550;border-radius:6px;color:#d0dde8;font-family:'Roboto',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:#4da3ff;}
.color-picker-row{display:flex;gap:8px;flex-wrap:wrap;}
.color-opt{width:28px;height:28px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .15s;}
.color-opt:hover,.color-opt.selected{border-color:#fff;transform:scale(1.1);}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

footer{text-align:center;padding:24px;font-size:10px;color:#1a3050;letter-spacing:2px;font-family:'Rajdhani',sans-serif;text-transform:uppercase;}
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">SIRI<span>US</span> — Notes de Lignes</div>
    <div class="header-sub">Carnet de bord · TSC</div>
  </div>
  <button class="btn btn-primary" onclick="openAddModal()">+ Nouvelle ligne</button>
</header>

<div class="container">
  <div class="toolbar">
    <input type="text" class="search-bar" id="searchBar" placeholder="Rechercher une ligne ou une note…" oninput="renderLines()">
    <button class="btn btn-secondary" onclick="exportNotes()">⬇ Exporter</button>
    <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">⬆ Importer</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importNotes(event)">
  </div>
  <div class="notes-list" id="notesList"></div>
</div>

<!-- Modal ajout ligne -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>Ajouter une ligne</h2>
    <div class="form-group">
      <label>Nom de la ligne</label>
      <input class="form-input" id="newLineName" placeholder="Ex: Lyon Part-Dieu · Jour">
    </div>
    <div class="form-group">
      <label>Numéro / Code</label>
      <input class="form-input" id="newLineCode" placeholder="Ex: 82522 · AGC 5V">
    </div>
    <div class="form-group">
      <label>Couleur</label>
      <div class="color-picker-row" id="colorPicker"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeAddModal()">Annuler</button>
      <button class="btn btn-primary" onclick="addLine()">Ajouter</button>
    </div>
  </div>
</div>

<footer>SIRIUS TSC · Notes de lignes · Non affilié à la SNCF</footer>

<script>
'use strict';

const COLORS=['#4da3ff','#e89b2d','#27ae60','#7c3aed','#e05555','#0ea5e9','#f59e0b','#10b981','#8b5cf6','#ef4444','#06b6d4','#84cc16'];
let selectedColor=COLORS[0];
let lines=JSON.parse(localStorage.getItem('siriusLines')||'[]');

// Init data par défaut si vide
if(!lines.length){
  lines=[
    {id:'lyon',name:'Lyon Part-Dieu · Jour',code:'82522 · AGC 5V',color:'#4da3ff',entries:[
      {pk:'0.96',text:'Départ Part-Dieu H — bien vérifier signaux quai A'},
      {pk:'9.35',text:'Vénissieux — arrêt court, attention accélération en côte'},
    ]},
    {id:'stjean',name:'ST Jean du Gard · Jour',code:'X76671 · AGC 3V',color:'#e89b2d',entries:[
      {pk:'2.70',text:'Boussot — passage lent, voie étroite'},
      {pk:'20.31',text:'St Jean du Gard — terminus, changement cabine voie 2'},
    ]},
  ];
  save();
}

function save(){localStorage.setItem('siriusLines',JSON.stringify(lines));}

function renderColorPicker(){
  const cp=document.getElementById('colorPicker');
  cp.innerHTML='';
  COLORS.forEach(c=>{
    const d=document.createElement('div');
    d.className='color-opt'+(c===selectedColor?' selected':'');
    d.style.background=c;
    d.onclick=()=>{selectedColor=c;renderColorPicker();};
    cp.appendChild(d);
  });
}

function renderLines(){
  const q=document.getElementById('searchBar').value.toLowerCase();
  const list=document.getElementById('notesList');
  list.innerHTML='';
  const filtered=lines.filter(l=>
    l.name.toLowerCase().includes(q)||
    l.code.toLowerCase().includes(q)||
    l.entries.some(e=>e.text.toLowerCase().includes(q)||e.pk.toLowerCase().includes(q))
  );
  if(!filtered.length){
    list.innerHTML='<div class="empty-state">Aucune ligne trouvée</div>';
    return;
  }
  filtered.forEach(line=>{
    const card=document.createElement('div');
    card.className='note-card';
    card.id='card-'+line.id;

    const entriesHtml=line.entries.map((e,i)=>`
      <div class="entry-item">
        <span class="entry-pk">PK ${e.pk}</span>
        <span class="entry-text">${escHtml(e.text)}</span>
        <button class="entry-del" onclick="delEntry('${line.id}',${i})" title="Supprimer">✕</button>
      </div>
    `).join('');

    card.innerHTML=`
      <div class="note-header" onclick="toggleCard('${line.id}')">
        <div class="note-line-tag" style="background:${line.color}20;color:${line.color};border:1px solid ${line.color}40;">${escHtml(line.code)}</div>
        <div class="note-title-wrap">
          <div class="note-line-name">${escHtml(line.name)}</div>
          <div class="note-line-meta">${line.entries.length} note${line.entries.length!==1?'s':''}</div>
        </div>
        <span class="note-count"></span>
        <button class="btn btn-danger" style="font-size:11px;padding:4px 10px;margin-right:8px;" onclick="event.stopPropagation();deleteLine('${line.id}')">Suppr.</button>
        <span class="note-chevron">›</span>
      </div>
      <div class="note-body">
        <div class="entries-list">${entriesHtml||'<div class="empty-state">Aucune note pour cette ligne</div>'}</div>
        <div class="add-entry-form">
          <input class="input-pk" id="pk-${line.id}" placeholder="PK (ex: 9.35)">
          <input class="input-note" id="nt-${line.id}" placeholder="Ajouter une note…" onkeydown="if(event.key==='Enter')addEntry('${line.id}')">
          <button class="btn-add-entry" onclick="addEntry('${line.id}')">+ Ajouter</button>
        </div>
      </div>
    `;
    list.appendChild(card);
  });
}

function toggleCard(id){
  const card=document.getElementById('card-'+id);
  if(card)card.classList.toggle('expanded');
}

function addEntry(lineId){
  const pk=document.getElementById('pk-'+lineId).value.trim();
  const text=document.getElementById('nt-'+lineId).value.trim();
  if(!text)return;
  const line=lines.find(l=>l.id===lineId);
  if(!line)return;
  line.entries.push({pk:pk||'—',text});
  line.entries.sort((a,b)=>parseFloat(a.pk||0)-parseFloat(b.pk||0));
  save();
  const wasOpen=document.getElementById('card-'+lineId)?.classList.contains('expanded');
  renderLines();
  if(wasOpen){const c=document.getElementById('card-'+lineId);if(c)c.classList.add('expanded');}
}

function delEntry(lineId,idx){
  const line=lines.find(l=>l.id===lineId);
  if(!line)return;
  line.entries.splice(idx,1);
  save();
  const wasOpen=document.getElementById('card-'+lineId)?.classList.contains('expanded');
  renderLines();
  if(wasOpen){const c=document.getElementById('card-'+lineId);if(c)c.classList.add('expanded');}
}

function deleteLine(id){
  if(!confirm('Supprimer cette ligne et toutes ses notes ?'))return;
  lines=lines.filter(l=>l.id!==id);
  save();renderLines();
}

function openAddModal(){selectedColor=COLORS[0];renderColorPicker();document.getElementById('newLineName').value='';document.getElementById('newLineCode').value='';document.getElementById('addModal').classList.add('open');}
function closeAddModal(){document.getElementById('addModal').classList.remove('open');}

function addLine(){
  const name=document.getElementById('newLineName').value.trim();
  const code=document.getElementById('newLineCode').value.trim();
  if(!name)return alert('Veuillez saisir un nom de ligne.');
  const id='line_'+Date.now();
  lines.push({id,name,code:code||'—',color:selectedColor,entries:[]});
  save();closeAddModal();renderLines();
  // Ouvrir la carte créée
  setTimeout(()=>{const c=document.getElementById('card-'+id);if(c)c.classList.add('expanded');},50);
}

function exportNotes(){
  const blob=new Blob([JSON.stringify(lines,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='sirius_notes_lignes.json';a.click();
}

function importNotes(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(Array.isArray(d)){lines=d;save();renderLines();alert('Notes importées avec succès.');}}catch{alert('Fichier invalide.');}};
  r.readAsText(file);
  e.target.value='';
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Fermer modal en cliquant dehors
document.getElementById('addModal').addEventListener('click',e=>{if(e.target===document.getElementById('addModal'))closeAddModal();});

renderColorPicker();
renderLines();
</script>
</body>
</html>
